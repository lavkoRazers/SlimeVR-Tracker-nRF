name: SlimeNRF CI (Fixed 8MHz)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions: write-all

env:
  ZEPHYR_SDK_VERSION: "0.16.9"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      sdk-hash: ${{ steps.generate-vars.outputs.sdk-hash }}
      sdk-revision: ${{ steps.generate-vars.outputs.sdk-revision }}
      repo-url: ${{ steps.generate-vars.outputs.repo-url }}
      branch: ${{ steps.generate-vars.outputs.branch }}
      repo-hash: ${{ steps.generate-vars.outputs.repo-hash }}
    steps:
      - name: 💻 Checkout CI Repository
        uses: actions/checkout@v4
        with:
          path: zephyr-workspace/SlimeNRF-CI
          submodules: recursive

      - name: 📟 Generate CI Variables
        id: generate-vars
        run: |
          cd zephyr-workspace/SlimeNRF-CI
          WEST_FILE="west.yml"
          SDK_URL=$(yq -r '.manifest.projects[] | select(.name=="sdk-nrf") | .url' "$WEST_FILE")
          SDK_REVISION=$(yq -r '.manifest.projects[] | select(.name=="sdk-nrf") | .revision' "$WEST_FILE")
          SDK_COMMIT=$(git ls-remote "$SDK_URL" "$SDK_REVISION" | awk '{print $1}')
          
          echo "sdk-hash=$SDK_COMMIT" >> "$GITHUB_OUTPUT"
          echo "sdk-revision=$SDK_REVISION" >> "$GITHUB_OUTPUT"
          echo "repo-url=https://github.com/$GITHUB_REPOSITORY.git" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          echo "repo-hash=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: 📦 Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: 🪁 Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}/setup.sh -c -t arm-zephyr-eabi

      - name: 📦 Cache West Workspace
        id: cache-west
        uses: actions/cache@v4
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
          key: west-workspace-${{ steps.generate-vars.outputs.sdk-hash }}

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boards: [
          {boardname: "promicro_uf2/nrf52840/spi", fileformat: "uf2", filename: "SlimeNRF_ProMicro_SPI_8MHz"},
          {boardname: "promicro_uf2/nrf52840/smspi", fileformat: "uf2", filename: "SlimeNRF_ProMicro_smSPI_Fixed"}
        ]
    steps:
      - name: 💻 Checkout Fresh Firmware
        uses: actions/checkout@v4
        with:
          path: zephyr-workspace/SlimeVR-Tracker-nRF
          fetch-depth: 0
          submodules: recursive

      - name: 🛠 Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf device-tree-compiler python3-pip python3-venv wget xz-utils file make gcc

      - name: 📦 Restore SDK
        uses: actions/cache/restore@v4
        with:
          path: ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: 📦 Restore West Workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            zephyr-workspace/.west
            zephyr-workspace/zephyr
            zephyr-workspace/nrf
            zephyr-workspace/modules
            zephyr-workspace/nrfxlib
          key: west-workspace-${{ needs.setup.outputs.sdk-hash }}

      - name: 🐍 Setup Python
        run: |
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          pip install west ninja
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          
          cd zephyr-workspace/SlimeVR-Tracker-nRF
          git submodule update --init --recursive
          
          cd ..
          west init -l SlimeVR-Tracker-nRF || true
          west update --narrow -o=--depth=1
          pip install -r zephyr/scripts/requirements.txt

      - name: 🔍 Debug DTS (Verify 8MHz)
        run: |
          echo "Checking frequency in boards/nordic/promicro_uf2/promicro_uf2_spi.dts"
          grep "max-frequency" zephyr-workspace/SlimeVR-Tracker-nRF/boards/nordic/promicro_uf2/promicro_uf2_spi.dts || echo "Not found"

      - name: 🔨 Build Firmware
        run: |
          source ~/.venv/bin/activate
          export ZEPHYR_SDK_INSTALL_DIR=$HOME/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          
          ABS_REPO_PATH=$GITHUB_WORKSPACE/zephyr-workspace/SlimeVR-Tracker-nRF
          
          cd zephyr-workspace
          west build \
            --board ${{ matrix.boards.boardname }} \
            --pristine=always "$ABS_REPO_PATH" \
            --build-dir "build" \
            -- \
            -DNCS_TOOLCHAIN_VERSION=NONE \
            -DBOARD_ROOT="$ABS_REPO_PATH"
            
          # Вытаскиваем файл из глубины папок
          mkdir -p bin_out
          find build -name "zephyr.${{ matrix.boards.fileformat }}" -exec cp {} bin_out/${{ matrix.boards.filename }}.${{ matrix.boards.fileformat }} \;

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.boards.filename }}
          path: zephyr-workspace/bin_out/${{ matrix.boards.filename }}.${{ matrix.boards.fileformat }}
