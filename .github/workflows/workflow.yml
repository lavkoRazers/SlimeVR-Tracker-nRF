name: Build Fixed SlimeNRF 8MHz

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 💻 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf device-tree-compiler python3-pip python3-setuptools python3-tk python3-wheel xz-utils file make gcc gcc-multilib g++-multilib

      - name: 🐍 Setup West & Update Modules
        run: |
          pip3 install west
          west init -l . || true
          west update --narrow -o=--depth=1
          west zephyr-export
          
          # Динамически находим путь к zephyr, чтобы не было ошибки "No such file"
          ZEPHYR_DIR=$(west list zephyr -f {path})
          echo "Zephyr found at: $ZEPHYR_DIR"
          pip3 install -r $ZEPHYR_DIR/scripts/requirements.txt

      - name: 🪁 Setup Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          ./zephyr-sdk-0.16.5/setup.sh -c -t arm-zephyr-eabi

      - name: 🔍 Debug DTS (Check 8MHz)
        run: |
          echo "--- Checking SPI Frequency in DTS ---"
          # Проверяем файл в твоей новой папке boards/nordic/
          grep "max-frequency" boards/nordic/promicro_uf2/promicro_uf2_spi.dts || echo "Frequency entry not found!"

      - name: 🔨 Build Firmware (Pristine)
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk-0.16.5
          # Собираем версию SPI с флагом полной очистки кеша
          west build -p -b promicro_uf2/nrf52840/spi . \
            -- -DNCS_TOOLCHAIN_VERSION=NONE

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlimeNRF_8MHz_Fixed
          path: build/zephyr/zephyr.uf2
