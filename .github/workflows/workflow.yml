name: Build SlimeNRF 8MHz Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 💻 Checkout
        uses: actions/checkout@v4
        with:
          # Качаем прямо в текущую папку без подпапок
          submodules: recursive

      - name: 🛠 Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf device-tree-compiler python3-pip python3-setuptools python3-tk python3-wheel xz-utils file make gcc gcc-multilib g++-multilib

      - name: 🐍 Setup West
        run: |
          pip3 install west
          # Инициализируем west прямо здесь
          west init -l . || true
          west update --narrow -o=--depth=1
          west zephyr-export
          
          # Устанавливаем зависимости по самому прямому пути, который создает west
          # Обычно это zephyr/scripts/requirements.txt относительно корня
          if [ -f "zephyr/scripts/requirements.txt" ]; then
            pip3 install -r zephyr/scripts/requirements.txt
          else
            # Если west положил ядро в другое место, ищем его
            pip3 install -r $(find . -name requirements.txt | grep scripts | head -n 1)
          fi

      - name: 🪁 Setup SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          ./zephyr-sdk-0.16.5/setup.sh -c -t arm-zephyr-eabi

      - name: 🔍 Debug DTS
        run: |
          echo "--- Checking Frequency ---"
          # Твой новый путь к плате
          grep "max-frequency" boards/nordic/promicro_uf2/promicro_uf2_spi.dts || echo "Not found"

      - name: 🔨 Build
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk-0.16.5
          # Собираем из корня (.) с принудительной очисткой (-p)
          west build -p -b promicro_uf2/nrf52840/spi . -- -DNCS_TOOLCHAIN_VERSION=NONE

      - name: 💾 Upload
        uses: actions/upload-artifact@v4
        with:
          name: SlimeNRF_8MHz_Fixed
          path: build/zephyr/zephyr.uf2
