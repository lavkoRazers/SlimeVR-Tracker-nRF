name: Build Fresh SlimeNRF

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Кэшируем только SDK и West-окружение, но НЕ саму папку с кодом прошивки
    steps:
      - name: 💻 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf device-tree-compiler python3-pip python3-setuptools python3-tk python3-wheel xz-utils file make gcc gcc-multilib g++-multilib

      - name: 🐍 Setup Python & West
        run: |
          pip3 install west
          west init -l . || true
          west update --narrow -o=--depth=1
          west zephyr-export
          # Автоматически находим путь к zephyr и ставим требования
          ZEPHYR_DIR=$(west list zephyr -f {path})
          pip3 install -r $ZEPHYR_DIR/scripts/requirements.txt

      - name: 🪁 Setup Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64_minimal.tar.xz
          ./zephyr-sdk-0.16.5/setup.sh -c -t arm-zephyr-eabi

      # ЭТОТ ШАГ ПОКАЖЕТ ТВОИ ПРАВКИ В ЛОГАХ GITHUB
      - name: 🔍 Debug DTS Check
        run: |
          echo "--- Checking SPI Frequency in DTS ---"
          grep "max-frequency" boards/arm/promicro_uf2/promicro_uf2.dts || echo "File not found or no frequency entry"

      - name: 🔨 Build Firmware (Pristine)
        run: |
          # Флаг -p гарантирует очистку папки build перед сборкой
          export ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk-0.16.5
          west build -p -b promicro_uf2/nrf52840/spi .

      - name: 💾 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlimeNRF_Fixed_8MHz
          path: build/zephyr/zephyr.uf2
